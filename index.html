<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Math Editor</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    height: 100vh;
    overflow: hidden;
    background: linear-gradient(120deg, #1e3c72, #2a5298, #6dd5ed);
    background-size: 300% 300%;
    animation: bg 15s infinite;
}

@keyframes bg {
    0% {background-position:0% 50%;}
    50% {background-position:100% 50%;}
    100% {background-position:0% 50%;}
}

/* Floating symbols */
.sym {
    position: absolute;
    color: rgba(255,255,255,0.08);
    font-size: 40px;
    animation: float 20s linear infinite;
}

@keyframes float {
    from {transform: translateY(100vh);}
    to {transform: translateY(-10vh);}
}

/* Main App */
.app {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%,-50%);
    width: 90%;
    height: 85%;
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(12px);
    border-radius: 15px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

/* Top bar */
.topbar {
    height: 50px;
    background: rgba(0,0,0,0.3);
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: white;
    padding: 0 10px;
}

.btn {
    background: rgba(255,255,255,0.2);
    border: none;
    color: white;
    padding: 6px 10px;
    margin-left: 5px;
    border-radius: 5px;
    cursor: pointer;
}

.btn:hover {
    background: rgba(255,255,255,0.4);
}

/* Main */
.main {
    display: flex;
    flex: 1;
}

/* Editor */
.editor {
    flex: 2;
    padding: 20px;
    color: white;
    font-size: 18px;
    outline: none;
    overflow-y: auto;
}

/* Keyboard */
.keyboard {
    flex: 1;
    background: rgba(0,0,0,0.3);
    padding: 10px;
    overflow-y: auto;
}

.section {
    color: white;
    font-size: 12px;
    margin-top: 10px;
    opacity: 0.8;
}

.key {
    margin: 3px;
    padding: 6px;
    background: rgba(255,255,255,0.2);
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

.key:hover {
    background: rgba(255,255,255,0.4);
}
</style>
</head>

<body>

<!-- Floating symbols -->
<div class="sym" style="left:10%">π</div>
<div class="sym" style="left:30%">Σ</div>
<div class="sym" style="left:50%">√</div>
<div class="sym" style="left:70%">θ</div>
<div class="sym" style="left:85%">∫</div>

<!-- APP -->
<div class="app">

    <!-- TOP BAR -->
    <div class="topbar">
        <div>📘 Math Docs Editor</div>
        <div>
            <button class="btn" onclick="copyText()">Copy</button>
            <button class="btn" onclick="clearText()">Clear</button>
            <button class="btn" onclick="window.print()">Print</button>
        </div>
    </div>

    <!-- MAIN -->
    <div class="main">

        <!-- EDITOR -->
        <div id="editor" class="editor" contenteditable="true">
            Start writing your mathematics here...
        </div>

        <!-- KEYBOARD -->
        <div class="keyboard">

            <div class="section">NUMBERS</div>
            <button class="key" onclick="add('√')">√</button>
            <button class="key" onclick="add('∞')">∞</button>
            <button class="key" onclick="add('%')">%</button>

            <div class="section">COMPLEX NUMBERS</div>
            <button class="key" onclick="add('i')">i</button>

            <div class="section">PROBABILITY</div>
            <button class="key" onclick="add('P(A)')">P(A)</button>
            <button class="key" onclick="add('∩')">∩</button>
            <button class="key" onclick="add('∪')">∪</button>

            <div class="section">LOGARITHM</div>
            <button class="key" onclick="add('log')">log</button>

            <div class="section">CURRENCY</div>
            <button class="key" onclick="add('KSh')">KSh</button>

            <div class="section">MOTION</div>
            <button class="key" onclick="add('v = d/t')">v=d/t</button>

            <div class="section">CALCULUS</div>
            <button class="key" onclick="add('∫')">∫</button>
            <button class="key" onclick="add('d/dx')">d/dx</button>

            <div class="section">MEASUREMENT</div>
            <button class="key" onclick="add('cm')">cm</button>
            <button class="key" onclick="add('m²')">m²</button>

            <div class="section">GEOMETRY</div>
            <button class="key" onclick="add('∠')">∠</button>
            <button class="key" onclick="add('°')">°</button>
            <button class="key" onclick="add('π')">π</button>

        </div>
    </div>
</div>

<script>
function add(symbol){
    document.getElementById("editor").innerText += symbol;
}

function clearText(){
    document.getElementById("editor").innerText = "";
}

function copyText(){
    navigator.clipboard.writeText(document.getElementById("editor").innerText);
    alert("Copied!");
}
</script>

</body>
</html>
